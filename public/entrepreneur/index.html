<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ver profissional no Mundi App</title>

    <!-- Open Graph / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mundi App" />
    <meta property="og:title" content="Ver profissional no Mundi App" />
    <meta
      property="og:description"
      content="Encontre e contrate profissionais próximos a você. Veja avaliações, serviços e muito mais."
    />
    <meta
      property="og:image"
      content="https://mundiapp.com.br/images/dark_logo.png"
    />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:url" content="https://mundiapp.com.br/entrepreneur" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Ver profissional no Mundi App" />
    <meta
      name="twitter:description"
      content="Encontre e contrate profissionais próximos a você."
    />
    <meta
      name="twitter:image"
      content="https://mundiapp.com.br/images/dark_logo.png"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 20px;
        box-shadow: 0 4px 32px rgba(0, 0, 0, 0.08);
        padding: 48px 32px 36px;
        max-width: 380px;
        width: 100%;
        text-align: center;
      }
      .logo {
        width: 88px;
        height: 88px;
        object-fit: contain;
        border-radius: 20px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        color: #212121;
        margin-bottom: 10px;
      }
      p {
        font-size: 14px;
        color: #757575;
        line-height: 1.6;
        margin-bottom: 32px;
      }
      .btn-primary {
        display: block;
        background: #ffc107;
        color: #212121;
        font-weight: 700;
        font-size: 15px;
        padding: 15px 24px;
        border-radius: 12px;
        text-decoration: none;
        margin-bottom: 12px;
        transition: opacity 0.2s;
      }
      .btn-primary:hover {
        opacity: 0.88;
      }
      .btn-secondary {
        display: block;
        font-size: 13px;
        color: #9e9e9e;
        text-decoration: underline;
        padding: 8px;
      }
      #status {
        font-size: 12px;
        color: #bdbdbd;
        margin-top: 20px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/images/dark_logo.png" alt="Mundi App" />
      <h1>Ver profissional no Mundi App</h1>
      <p>
        Você foi convidado(a) a ver o perfil de um profissional na Mundi App.
      </p>

      <a id="btn-app" class="btn-primary" href="#">Abrir no Mundi App</a>
      <a
        id="btn-store"
        class="btn-secondary"
        href="https://play.google.com/store/apps/details?id=br.com.mundi.mundi_client_app"
        target="_blank"
      >
        Não tenho o app — Baixar agora
      </a>

      <div id="status">Tentando abrir o aplicativo…</div>
    </div>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var id = params.get("id");

        var deepLink = id
          ? "mundi://entrepreneur?id=" + id
          : "mundi://";

        document.getElementById("btn-app").href = deepLink;

        // Tenta abrir o app imediatamente
        window.location.href = deepLink;

        // Após 1.8 s, se ainda estiver na página, atualiza o status
        setTimeout(function () {
          document.getElementById("status").textContent =
            "App não encontrado. Baixe o Mundi App para continuar.";
        }, 1800);
      })();
    </script>
  </body>
</html>
