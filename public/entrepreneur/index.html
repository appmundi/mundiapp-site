<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ver profissional no Mundi App</title>

    <!-- Open Graph / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mundi App" />
    <meta property="og:title" content="Ver profissional no Mundi App" />
    <meta
      property="og:description"
      content="Encontre e contrate profissionais próximos a você. Veja avaliações, serviços e muito mais."
    />
    <meta
      property="og:image"
      content="https://mundiapp.com.br/images/dark_logo.png"
    />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:url" content="https://mundiapp.com.br/entrepreneur" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Ver profissional no Mundi App" />
    <meta
      name="twitter:description"
      content="Encontre e contrate profissionais próximos a você."
    />
    <meta
      name="twitter:image"
      content="https://mundiapp.com.br/images/dark_logo.png"
    />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0a0e1f;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 24px;
        padding: 24px;
      }
      .logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
        border-radius: 16px;
        opacity: 0.92;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255,193,7,0.2);
        border-top-color: #ffc107;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #status {
        font-size: 13px;
        color: rgba(255,255,255,0.45);
        letter-spacing: 0.2px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/images/dark_logo.png" alt="Mundi App" />
    <div class="spinner"></div>
    <p id="status">Abrindo o Mundi App…</p>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var id = params.get("id");

        var deepLink = id
          ? "mundi://entrepreneur?id=" + id
          : "mundi://";

        var androidStoreUrl =
          "https://play.google.com/store/apps/details?id=br.com.mundi.mundi_client_app&hl=pt_BR";
        // var iosStoreUrl = ""; // TODO: publicar na App Store

        var isIOS     = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        var isAndroid = /Android/i.test(navigator.userAgent);
        var status    = document.getElementById("status");

        var hasHidden = false;

        document.addEventListener("visibilitychange", function () {
          if (document.hidden) hasHidden = true;
        });

        // Tenta abrir o app
        window.location.href = deepLink;

        // Após 1.5 s: se a aba não ficou oculta (app não abriu), redireciona
        setTimeout(function () {
          if (hasHidden) return;

          if (isAndroid) {
            window.location.href = androidStoreUrl;
          } else if (isIOS) {
            // TODO: window.location.href = iosStoreUrl;
            status.textContent = "Em breve disponível na App Store.";
          } else {
            // Desktop — só informa
            window.location.href = androidStoreUrl;
          }
        }, 1500);
      })();
    </script>
  </body>
</html>
